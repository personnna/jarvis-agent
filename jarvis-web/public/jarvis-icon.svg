<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <rect width="1024" height="1024" rx="200" fill="#020408"/>
  
  <!-- Grid background -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#4A9EE0" stroke-width="0.3" opacity="0.15"/>
    </pattern>
  </defs>
  <rect width="1024" height="1024" rx="200" fill="url(#grid)"/>

  <g transform="translate(512, 512)">
    <!-- Rays -->
    <line x1="0" y1="-340" x2="0" y2="-220" stroke="#4A9EE0" stroke-width="3" opacity="0.35"/>
    <line x1="0" y1="340" x2="0" y2="220" stroke="#4A9EE0" stroke-width="3" opacity="0.35"/>
    <line x1="-340" y1="0" x2="-220" y2="0" stroke="#4A9EE0" stroke-width="3" opacity="0.35"/>
    <line x1="340" y1="0" x2="220" y2="0" stroke="#4A9EE0" stroke-width="3" opacity="0.35"/>
    <line x1="-240" y1="-240" x2="-156" y2="-156" stroke="#4A9EE0" stroke-width="3" opacity="0.25"/>
    <line x1="240" y1="-240" x2="156" y2="-156" stroke="#4A9EE0" stroke-width="3" opacity="0.25"/>
    <line x1="-240" y1="240" x2="-156" y2="156" stroke="#4A9EE0" stroke-width="3" opacity="0.25"/>
    <line x1="240" y1="240" x2="156" y2="156" stroke="#4A9EE0" stroke-width="3" opacity="0.25"/>

    <!-- Rings -->
    <circle cx="0" cy="0" r="300" fill="none" stroke="#4A9EE0" stroke-width="2" opacity="0.1"/>
    <circle cx="0" cy="0" r="220" fill="none" stroke="#4A9EE0" stroke-width="2.5" opacity="0.2"/>
    <circle cx="0" cy="0" r="148" fill="none" stroke="#4A9EE0" stroke-width="3" opacity="0.4"/>
    <circle cx="0" cy="0" r="80" fill="none" stroke="#4A9EE0" stroke-width="3" opacity="0.6"/>

    <!-- Tick marks -->
    <line x1="0" y1="-300" x2="0" y2="-276" stroke="#4A9EE0" stroke-width="5" opacity="0.5"/>
    <line x1="300" y1="0" x2="276" y2="0" stroke="#4A9EE0" stroke-width="5" opacity="0.5"/>
    <line x1="0" y1="300" x2="0" y2="276" stroke="#4A9EE0" stroke-width="5" opacity="0.5"/>
    <line x1="-300" y1="0" x2="-276" y2="0" stroke="#4A9EE0" stroke-width="5" opacity="0.5"/>

    <!-- Core -->
    <circle cx="0" cy="0" r="44" fill="#4A9EE0"/>
    <circle cx="0" cy="0" r="26" fill="#93C5FD"/>
    <circle cx="0" cy="0" r="12" fill="#ffffff"/>
  </g>
</svg>
